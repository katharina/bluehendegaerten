    document.getElementById('apf-cancel').addEventListener('click', closeAddPlantForm);

    // ── GBIF taxonomy lookup ──────────────────────────────────────────────────
    const FAMILY_COLORS = {
      Asteraceae:     '#f5d040',
      Lamiaceae:      '#9b7fc7',
      Rosaceae:       '#f5a0b0',
      Ranunculaceae:  '#6b9fd4',
      Apiaceae:       '#d4c878',
      Papaveraceae:   '#e85545',
      Fabaceae:       '#d478c8',
      Boraginaceae:   '#5878d4',
      Solanaceae:     '#a060d0',
      Brassicaceae:   '#e8d040',
      Amaranthaceae:  '#c84848',
      Primulaceae:    '#f5c040',
      Paeoniaceae:    '#e878a0',
      Tropaeolaceae:  '#f59020',
      Plantaginaceae: '#6878d4',
      Polygonaceae:   '#d4a878',
      Campanulaceae:  '#7890d4',
      Scrophulariaceae:'#a07fd4',
      Caryophyllaceae:'#f0a0c8',
      Violaceae:      '#7860c8',
      Geraniaceae:    '#d47880',
    };

    function applyFamilyColor(family) {
      const apfColor = document.getElementById('apf-color');
      const color = FAMILY_COLORS[family];
      if (color) apfColor.value = color;
    }
    let _gbifTimer = null;
    const apfName   = document.getElementById('apf-name');
    const apfFamily = document.getElementById('apf-family');
    const apfLookupStatus = (() => {
      const el = document.createElement('span');
      el.style.cssText = 'font-size:10px;color:#aaa;margin-left:8px;';
      apfFamily.parentElement.appendChild(el);
      return el;
    })();

    const apfNameDe = document.getElementById('apf-name-de');
    let _gbifDeTimer = null;

    apfNameDe.addEventListener('input', () => {
      clearTimeout(_gbifDeTimer);
      const q = apfNameDe.value.trim();
      if (q.length < 3) return;
      _gbifDeTimer = setTimeout(async () => {
        try {
          apfLookupStatus.textContent = '…';
          // Step 1: Wikidata search (handles aliases + case) → scientific name
          // prefer species-rank hits over genus
          const searchRes = await fetch(
            `https://www.wikidata.org/w/api.php?action=wbsearchentities&search=${encodeURIComponent(q)}&language=de&type=item&limit=8&format=json&origin=*`
          ).then(r => r.json());

          let sciName = null;
          let sciNameGenus = null;
          for (const hit of searchRes.search ?? []) {
            const ent = await fetch(
              `https://www.wikidata.org/w/api.php?action=wbgetentities&ids=${hit.id}&props=claims&format=json&origin=*`
            ).then(r => r.json());
            const claims = ent.entities?.[hit.id]?.claims ?? {};
            const sci = claims.P225?.[0]?.mainsnak?.datavalue?.value;
            if (!sci) continue;
            const rankId = claims.P105?.[0]?.mainsnak?.datavalue?.value?.id;
            if (rankId === 'Q7432') { sciName = sci; break; }          // species
            if (!sciNameGenus) sciNameGenus = sci;                       // genus fallback
          }
          if (!sciName) sciName = sciNameGenus;
          if (!sciName) { apfLookupStatus.textContent = 'nicht gefunden'; return; }

          if (!apfName.value) apfName.value = sciName;

          // Step 2: GBIF match → family
          const gbif = await fetch(
            `https://api.gbif.org/v1/species/match?kingdom=Plantae&name=${encodeURIComponent(sciName)}`
          ).then(r => r.json());
          if (gbif.family) {
            if (!apfFamily.value) { apfFamily.value = gbif.family; applyFamilyColor(gbif.family); }
            apfLookupStatus.textContent = gbif.family;
          }
        } catch { apfLookupStatus.textContent = ''; }
      }, 600);
    });

    apfName.addEventListener('input', () => {
      clearTimeout(_gbifTimer);
      const q = apfName.value.trim();
      if (q.length < 4) return;
      apfLookupStatus.textContent = '…';
      _gbifTimer = setTimeout(async () => {
        try {
          const data = await fetch(
            `https://api.gbif.org/v1/species/match?kingdom=Plantae&name=${encodeURIComponent(q)}`
          ).then(r => r.json());
          if (data.family && (data.confidence ?? 0) >= 70) {
            if (!apfFamily.value) { apfFamily.value = data.family; applyFamilyColor(data.family); }
            apfLookupStatus.textContent = `${data.family} · ${data.confidence}%`;
          } else {
            apfLookupStatus.textContent = data.matchType === 'NONE' ? 'nicht gefunden' : '';
          }
        } catch {
          apfLookupStatus.textContent = '';
        }
      }, 600);
    });

    document.getElementById('apf-submit').addEventListener('click', async () => {
      const name    = document.getElementById('apf-name').value.trim();
      const name_de = document.getElementById('apf-name-de').value.trim();
      const family  = document.getElementById('apf-family').value.trim();
      const width   = parseFloat(document.getElementById('apf-width').value) || 50;
      const height  = parseFloat(document.getElementById('apf-height').value) || 100;
      const color   = document.getElementById('apf-color').value;
      const errEl   = document.getElementById('apf-error');

      if (!name) { errEl.textContent = 'Botanischer Name fehlt.'; errEl.style.display = ''; return; }

      const slug = toSlug(name);
      const res = await authedFetch('/api/custom-plants', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          slug, name, name_de, family, color,
          world_w: width / 100, world_h: height / 100,
          garden: activeGarden,
        }),
      });

      if (!res.ok) {
        const err = await res.json();
        errEl.textContent = err.error === 'slug already exists' ? 'Pflanze existiert bereits.' : err.error;
        errEl.style.display = '';
        return;
      }

      const p = await res.json();
      const entry = {
        slug: p.slug, name: p.name, name_de: p.name_de, family: p.family,
        color: p.color, worldW: p.world_w, worldH: p.world_h, _custom: true,
      };
      bySlug.set(p.slug, entry);
      if (!stagesBySlug.has(p.slug)) stagesBySlug.set(p.slug, []);
      const g = gardens.find(g => g.id === p.garden);
      if (g && !g.plants.includes(p.slug)) g.plants.push(p.slug);

      // reset form
      ['apf-name','apf-name-de','apf-family','apf-width','apf-height'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('apf-color').value = '#a0c878';
      errEl.style.display = 'none';
      closeAddPlantForm();
      render();
    });

    renderBedPlan();

    const tooltip = document.getElementById('bed-tooltip');
    let _uploadBedIndex = null;
    const bedImgInput = document.getElementById('bed-img-input');
    bedImgInput.addEventListener('change', async () => {
      const file = bedImgInput.files[0];
      if (!file || _uploadBedIndex === null) return;
      try {
        const filename = await uploadToR2(file);
        await authedFetch('/api/bed-images', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ garden: activeGarden, bed_index: _uploadBedIndex, filename }),
        });
        await loadBedImages();
        renderBedPlan();
      } catch {}
      bedImgInput.value = '';
      _uploadBedIndex = null;
    });

    document.getElementById('bed-plan').addEventListener('click', e => {
      if (editMode) {
        const uploadEl = e.target.closest('[data-upload-bed]');
        if (uploadEl) {
          _uploadBedIndex = parseInt(uploadEl.dataset.uploadBed);
          bedImgInput.click();
          return;
        }
        const el = e.target.closest('circle[data-id]');
        if (el && el.dataset.slug === selectedSlug) {
          removePlacement(el.dataset.id);
          return;
        }
        if (!selectedSlug) return;
        const coords = svgWorldCoords(e);
        if (!coords) return;
        if (inBed(coords.x, coords.z)) addPlacement(selectedSlug, coords.x, coords.z);
      } else {
        const el = e.target.closest('circle[data-slug]');
        if (el) {
          const p = bySlug.get(el.dataset.slug);
          if (p) openModal(p);
        }
      }
    });

    document.getElementById('bed-plan').addEventListener('mousemove', e => {
      const el = e.target.closest('circle[data-slug]');
      if (el) {
        tooltip.querySelector('.tt-name').textContent = el.dataset.name;
        tooltip.querySelector('.tt-de').textContent = el.dataset.de;
        tooltip.style.display = 'block';
        tooltip.style.left = (e.clientX + 12) + 'px';
        tooltip.style.top  = (e.clientY + 12) + 'px';
      } else {
        tooltip.style.display = 'none';
      }
    });
    document.getElementById('bed-plan').addEventListener('mouseleave', () => {
      tooltip.style.display = 'none';
    });

    document.getElementById('plant-filter').addEventListener('input', e => {
      filterText = e.target.value.toLowerCase();
      render();
      renderBedPlan();
    });

    function render() {
      // index: all plants; garden + edit: all plants (pick any for plan); garden view: garden.plants
      const slugs = (activeGarden && !editMode)
        ? new Set(gardens.find(g => g.id === activeGarden)?.plants ?? [])
        : null;

      const plants = [...bySlug.values()]
        .filter(p => !slugs || slugs.has(p.slug))
        .filter(p => !filterText ||
          p.name.toLowerCase().includes(filterText) ||
          (p.name_de ?? '').toLowerCase().includes(filterText) ||
          (p.family ?? '').toLowerCase().includes(filterText))
        .sort((a, b) => a.name.localeCompare(b.name));

      const globalMaxW = Math.max(...[...bySlug.values()].map(p => p.worldW ?? 0.3));

      const grid = document.getElementById('plant-grid');
      grid.innerHTML = '';
      plants.forEach(p => {
        const dotSize = Math.round((p.worldW ?? 0.3) / globalMaxW * 64);
        const card = document.createElement('div');
        card.className = 'plant-card' + (editMode && p.slug === selectedSlug ? ' selected' : '');
        card.dataset.slug = p.slug;
        card.style.setProperty('--dot-color', p.color ?? '#ccc');
        card.style.setProperty('--card-fg', contrastColor(p.color ?? '#ccc'));
        card.addEventListener('mouseenter', () => {
          if (!obsCache.has(p.slug))
            fetch(`/api/observations?slug=${p.slug}`).then(r => r.json()).then(d => obsCache.set(p.slug, d)).catch(() => {});
        }, { once: true });
        card.innerHTML = `
          <span class="card-dot" style="background:${p.color ?? '#ccc'};width:${dotSize}px;height:${dotSize}px"></span>
          <span class="card-name">${p.name}</span>
          <div class="card-meta-row">
            ${'' /* p._invasiv ? '<span class="card-invasiv">⚠</span>' : '' */}
            <div>
              <div class="card-de">${p.name_de ?? ''}</div>
              <div class="card-family">${p.family ?? ''}</div>
            </div>
          </div>
        `;
        card.addEventListener('click', () => {
          if (editMode) { setSelectedSlug(p.slug === selectedSlug ? null : p.slug); renderBedPlan(); render(); }
          else openModal(p);
        });
        grid.appendChild(card);
      });
    }

    function applyGarden(gardenId) {
      activeGarden = gardenId;
      const g = gardens.find(g => g.id === gardenId);
      document.body.classList.toggle('index-mode', !gardenId);
      if (g) {
        document.getElementById('plant-col-title').textContent = g.name;
        document.getElementById('garden-big-title').textContent = g.id === 'betonbeete' ? 'Der Große Garten' : g.name;
        document.getElementById('garden-title').innerHTML = g.id === 'betonbeete' ? `<h1>${g.name}</h1>` : '';
        document.getElementById('garden-info').innerHTML = g.description ?? '';
      } else {
        document.getElementById('plant-col-title').textContent = 'Alle Pflanzen';
      }
      document.querySelectorAll('.garden-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.gardenId === gardenId));
      if (editMode) { editMode = false; document.body.classList.remove('edit-mode'); }
      render();
    }

    if (gardens.length > 1) {
      const bar = document.getElementById('garden-bar');
      bar.style.display = 'flex';
      gardens.forEach(g => {
        const btn = document.createElement('button');
        btn.className = 'garden-btn' + (g.id === activeGarden ? ' active' : '');
        btn.dataset.gardenId = g.id;
        btn.textContent = g.name;
        btn.onclick = () => {
          const path = '/' + (g.path ?? g.id);
          history.pushState({ gardenId: g.id }, '', path);
          applyGarden(g.id);
        };
        bar.appendChild(btn);
      });
    }

    window.addEventListener('popstate', e => {
      const urlPath = window.location.pathname.replace(/^\/|\/$/g, '');
      const g = gardens.find(g => (g.path ?? g.id) === urlPath);
      applyGarden(g?.id ?? null);
    });

    const activeG = gardens.find(g => g.id === activeGarden);
    if (activeG) {
      document.getElementById('plant-col-title').textContent = activeG.name;
      document.getElementById('garden-big-title').textContent = activeG.id === 'betonbeete' ? 'Der Große Garten' : activeG.name;
      document.getElementById('garden-title').innerHTML = activeG.id === 'betonbeete' ? `<h1>${activeG.name}</h1>` : '';
      document.getElementById('garden-info').innerHTML = activeG.description ?? '';
    } else {
      document.getElementById('plant-col-title').textContent = 'Alle Pflanzen';
      document.getElementById('garden-section').insertAdjacentHTML('beforeend',
        `<ul id="garden-list">${gardens.map(g => `<li><a href="/${g.path ?? g.id}">${g.name}</a></li>`).join('')}</ul>`);
    }

    const loader = document.getElementById('loader');
    loader.classList.add('hidden');
    loader.addEventListener('transitionend', () => loader.remove(), { once: true });

    document.body.classList.toggle('index-mode', !activeGarden);
    render();
    document.getElementById('content').classList.add('ready');

    // ── Index photo carousel ──────────────────────────────────────────────────
    function buildCarouselItem(o) {
      const item = document.createElement('div');
      item.className = 'carousel-item';
      const plantName = o.slugs.map(s => bySlug.get(s)?.name).filter(Boolean).join(', ');
      item.innerHTML = `
        <div class="carousel-item-img">
          <img src="${thumbUrl(o.filename)}" onerror="this.src='${R2_URL}/${o.filename}'" loading="lazy">
        </div>
        <div class="carousel-item-meta">
          ${plantName ? `<div class="carousel-item-plants">${plantName}</div>` : ''}
          ${o.lat != null ? `<div class="carousel-item-gps"></div>` : ''}
        </div>
        ${_currentUser ? `<div class="carousel-item-btns">
          <button class="carousel-item-edit" title="Bearbeiten">✎</button>
          <button class="carousel-item-del" title="Löschen">×</button>
        </div>` : ''}
      `;
      if (o.lat != null) {
        const el = item.querySelector('.carousel-item-gps');
        if (o.place) { if (el) el.textContent = o.place; }
        else getPlace(o.lat, o.lon).then(p => {
          if (el && p) el.textContent = p;
          if (p) authedFetch(`/api/observations/${o.id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ place: p }) }).catch(() => {});
        });
      }
      item.querySelector('.carousel-item-img').addEventListener('click', () => {
        lightboxImg.src = `${R2_URL}/${o.filename}`;
        lightbox.classList.add('open');
      });
      if (_currentUser) {
        item.querySelector('.carousel-item-edit').addEventListener('click', () => openQuickObsEdit(o));
        item.querySelector('.carousel-item-del').addEventListener('click', async () => {
          if (!confirm('Eintrag wirklich löschen?')) return;
          await authedFetch(`/api/observations/${o.id}`, { method: 'DELETE' });
          item.remove();
        });
      }
      return item;
    }

    fetch('/api/observations').then(r => r.json()).then(all => {
      const photos = all.filter(o => o.filename && o.type === 'foto');
      if (!photos.length) return;
      const carousel = document.getElementById('obs-carousel');
      photos.forEach(o => carousel.appendChild(buildCarouselItem(o)));
    }).catch(() => {});

    document.getElementById('all-fotos-btn').addEventListener('click', async () => {
      const list = document.getElementById('all-obs-list');
      document.getElementById('all-obs-title').textContent = 'Alle Fotos';
      list.innerHTML = '<div class="all-obs-empty">Wird geladen…</div>';
      document.getElementById('all-obs-backdrop').classList.add('open');
      const obs = await fetch('/api/observations').then(r => r.json());
      const fotos = obs.filter(o => o.filename && o.type === 'foto');
      list.innerHTML = '';
      list.style.cssText = 'display:flex;flex-wrap:wrap;gap:12px;align-content:flex-start;';
      if (!fotos.length) { list.innerHTML = '<div class="all-obs-empty">Noch keine Fotos</div>'; return; }
      fotos.forEach(o => list.appendChild(buildCarouselItem(o)));
    });

    // ── Lightbox ──────────────────────────────────────────────────────────────
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    document.addEventListener('click', e => {
      if (e.target.classList.contains('obs-card-thumb')) {
        lightboxImg.src = e.target.src;
        lightbox.classList.add('open');
      }
    });

    lightbox.addEventListener('click', () => lightbox.classList.remove('open'));
    document.addEventListener('keydown', e => { if (e.key === 'Escape') lightbox.classList.remove('open'); });

  </script>
</body>
</html>
