<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Beton Beete</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fff; font-family: system-ui, sans-serif; overflow: hidden; height: 100vh; }

    #wordmark {
      position: absolute;
      top: 16px;
      left: 20px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: #222;
      z-index: 10;
      pointer-events: none;
    }

    #canvas-wrap { position: absolute; inset: 0; z-index: 0; }
    #canvas-wrap canvas { display: block; width: 100% !important; height: 100% !important; }

    #ui {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .month-btn {
      padding: 6px 16px;
      border: 1px solid #ccc;
      border-radius: 20px;
      background: #fff;
      font-size: 12px;
      cursor: pointer;
      color: #666;
      transition: all 0.15s;
    }

    .month-btn:hover { border-color: #888; color: #222; }
    .month-btn.active { background: #222; color: #fff; border-color: #222; }

    #view-ui {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 6px;
      z-index: 10;
    }

    .view-btn {
      padding: 5px 12px;
      border: 1px solid #ccc;
      border-radius: 20px;
      background: #fff;
      font-size: 11px;
      cursor: pointer;
      color: #666;
      transition: all 0.15s;
    }
    .view-btn:hover { border-color: #888; color: #222; }
    .view-btn.active { background: #222; color: #fff; border-color: #222; }

    #hint {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: #bbb;
      pointer-events: none;
      z-index: 10;
    }

    #view-ui {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 6px;
      z-index: 10;
    }

    .view-btn {
      padding: 5px 12px;
      border: 1px solid #ccc;
      border-radius: 20px;
      background: #fff;
      font-size: 11px;
      cursor: pointer;
      color: #666;
      transition: all 0.15s;
    }
    .view-btn:hover { border-color: #888; color: #222; }
    .view-btn.active { background: #222; color: #fff; border-color: #222; }
  </style>
</head>
<body>
  <div id="canvas-wrap"><canvas id="c"></canvas></div>

  <div id="wordmark">BETON BEETE</div>

  <div id="view-ui">
    <button class="view-btn active" data-view="iso-se">SE</button>
    <button class="view-btn" data-view="iso-sw">SW</button>
    <button class="view-btn" data-view="iso-ne">NE</button>
    <button class="view-btn" data-view="iso-nw">NW</button>
    <button class="view-btn" data-view="3d">3D</button>
  </div>

  <div id="ui">
    <button class="month-btn" data-month="february">Feb</button>
    <button class="month-btn" data-month="march">Mar</button>
    <button class="month-btn" data-month="april">Apr</button>
    <button class="month-btn" data-month="may">May</button>
    <button class="month-btn active" data-month="june">Jun</button>
    <button class="month-btn" data-month="july">Jul</button>
    <button class="month-btn" data-month="august">Aug</button>
    <button class="month-btn" data-month="september">Sep</button>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
