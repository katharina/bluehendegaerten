<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blühende Gärten — Pflanzenindex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&family=Bitter:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    :root {
      --font-serif: "Bitter", serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Hamburger button ─────────────────────────────────────────────── */
    #hamburger-btn {
      position: fixed; top: 16px; right: 20px; z-index: 300;
      background: none; border: none; cursor: pointer;
      display: flex; flex-direction: column; gap: 5px; padding: 4px;
    }
    #hamburger-btn span {
      display: block; width: 24px; height: 2px; background: #000;
      transition: opacity 0.15s;
    }
    #hamburger-btn:hover span { opacity: 0.5; }

    /* ── Menu panel ───────────────────────────────────────────────────── */
    #menu-backdrop {
      display: none; position: fixed; inset: 0; z-index: 290;
    }
    #menu-backdrop.open { display: block; }
    #menu-panel {
      position: fixed; top: 0; right: -260px; width: 240px; height: 100%;
      background: #fff; border-left: 1px solid #000; z-index: 295;
      display: flex; flex-direction: column; gap: 12px;
      padding: 56px 24px 32px;
      transition: right 0.25s ease;
    }
    #menu-panel.open { right: 0; }
    #menu-user-email { font-size: 12px; color: #888; min-height: 16px; }

    /* ── Login modal ──────────────────────────────────────────────────── */
    #login-backdrop {
      display: none; position: fixed; inset: 0; z-index: 10000;
      background: rgba(0,0,0,0.4); align-items: center; justify-content: center;
    }
    #login-backdrop.open { display: flex; }
    #login-modal {
      background: #fff; position: relative;
      width: min(420px, 92vw); padding: 48px 40px 40px;
    }
    #login-close {
      position: absolute; top: 12px; right: 16px;
      font-size: 28px; line-height: 1; background: none; border: none;
      cursor: pointer; color: #888;
    }
    #login-close:hover { color: #000; }
    #login-title {
      font-family: var(--font-serif); font-size: 40px; font-weight: 600;
      line-height: 1; margin-bottom: 32px;
    }
    #login-body { display: flex; flex-direction: column; gap: 16px; }
    #login-email {
      font-size: 14px; font-family: inherit; width: 100%;
      border: none; border-bottom: 1px solid #ccc;
      padding: 8px 0; outline: none; background: transparent; color: #222;
    }
    #login-email:focus { border-bottom-color: #000; }
    #login-msg { font-size: 13px; color: #555; min-height: 18px; }

    /* ── Add garden modal ─────────────────────────────────────────────── */
    #add-garden-backdrop {
      display: none; position: fixed; inset: 0; z-index: 10000;
      background: rgba(0,0,0,0.4); align-items: center; justify-content: center;
    }
    #add-garden-backdrop.open { display: flex; }
    #add-garden-modal {
      background: #fff; position: relative;
      width: min(480px, 92vw); padding: 48px 40px 40px;
    }
    #add-garden-close {
      position: absolute; top: 12px; right: 16px;
      font-size: 28px; line-height: 1; background: none; border: none;
      cursor: pointer; color: #888;
    }
    #add-garden-close:hover { color: #000; }
    #add-garden-title {
      font-family: var(--font-serif); font-size: 40px; font-weight: 600;
      line-height: 1; margin-bottom: 32px;
    }
    #add-garden-form-body { display: flex; flex-direction: column; gap: 20px; }
    .agf-field { display: flex; flex-direction: column; gap: 4px; }
    .agf-label { font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: #888; }
    .agf-input {
      font-size: 14px; font-family: inherit; width: 100%;
      border: none; border-bottom: 1px solid #ccc;
      padding: 8px 0; outline: none; background: transparent; color: #222;
    }
    .agf-input:focus { border-bottom-color: #000; }
    .agf-textarea { resize: vertical; min-height: 60px; }
    .agf-check { display: flex; align-items: center; gap: 10px; font-size: 14px; cursor: pointer; }
    .agf-check input { width: 16px; height: 16px; cursor: pointer; accent-color: #000; }
    #add-garden-msg { font-size: 13px; color: #c00; min-height: 18px; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #fff;
      font-family: "Source Code Pro", monospace;
      font-weight: 400;
      letter-spacing: -0.01em;
      color: #222;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px 48px;
      border-bottom: 1px solid #000;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 24px;
    }

    .wordmark {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
    }

    .header-right {
      display: flex;
      align-items: baseline;
      gap: 16px;
    }

    #garden-label {
      display: none;
      font-size: 12px;
      color: #888;
    }

    #garden-bar {
      display: none;
      gap: 6px;
    }

    .garden-btn {
      font-size: 11px;
      color: #888;
      background: none;
      border: 1px solid #ddd;
      border-radius: 20px;
      padding: 4px 12px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .garden-btn:hover { border-color: #888; color: #222; }
    .garden-btn.active { background: #222; color: #fff; border-color: #222; }

    .open-btn {
      font-size: 11px;
      color: #888;
      text-decoration: none;
      border: 1px solid #ddd;
      border-radius: 20px;
      padding: 5px 14px;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .open-btn:hover { border-color: #888; color: #222; }

    #edit-mode-btn { opacity: 0.5; }
    #edit-mode-btn.active { opacity: 1; }

    /* All observations modal */
    #all-obs-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
    }
    #all-obs-backdrop.open { display: block; }

    #all-obs-modal {
      background: #fff;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    #all-obs-close {
      position: absolute;
      top: 14px;
      right: 18px;
      font-size: 24px;
      background: none;
      border: none;
      cursor: pointer;
      color: #000;
      line-height: 1;
      z-index: 10;
    }
    #all-obs-close:hover { color: #555; }

    #all-obs-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      position: relative;
    }
    #all-obs-list.herbar-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      position: static;
    }
    .herbar-card {
      /* 6 cols, 5 gaps of 8px, 2×16px padding = 72px total offset */
      height: calc((100vw - 72px) / 6 * 4 / 3);
      position: relative;
      background-size: cover;
      background-position: center;
      background-color: #f0ede8;
      overflow: hidden;
    }
    .herbar-card .obs-card-delete {
      top: 6px;
      right: 6px;
      bottom: auto;
    }

    .all-obs-empty {
      font-size: 13px;
      color: #bbb;
      padding: 40px 0;
      text-align: center;
    }

    /* Edit mode layout */
    body.edit-mode #garden-description { display: none; }
    body.edit-mode #observations { width: 50%; }

    /* Edit indicator above bed plan */
    #bed-plan-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 0 12px;
      flex-shrink: 0;
    }
    #version-select-plan {
      font-size: 11px;
      font-family: inherit;
      border: none;
      border-bottom: 1px solid #ccc;
      padding: 3px 0;
      outline: none;
      background: transparent;
      color: #555;
      display: none;
    }
    body.edit-mode #version-select-plan { display: block; }
    #selected-plant-label {
      font-size: 12px;
      font-style: italic;
      color: #888;
      display: none;
    }
    body.edit-mode #selected-plant-label { display: block; }

    #bed-plan.editable { cursor: crosshair; }

    /* Selected plant card */
    .plant-card.selected {
      background: #f0f0f0;
      outline: 2px solid #000;
      outline-offset: -2px;
    }

    #content {
      display: flex;
      align-items: stretch;
      flex: 1;
      overflow: hidden;
    }

    #garden-description {
      padding: 40px 48px;
      width: 40vw;
      flex-shrink: 0;
      overflow-y: auto;
    }

    #garden-description h1 {
      font-family: var(--font-serif);
      font-size: 22px;
      font-weight: 600;
      letter-spacing: normal;
      color: #222;
      margin-bottom: 20px;
    }

    #garden-description p {
      font-size: 14px;
      line-height: 1.7;
      color: #444;
      margin-bottom: 1em;
    }
    #garden-description p:last-child { margin-bottom: 0; }

    #panels-area {
      display: flex;
      flex-shrink: 0;
    }
    #panels-area:hover #observations,
    #panels-area.panels-locked #observations {
      transform: translateX(-20vw);
    }
    #panels-area:hover #plant-col,
    #panels-area.panels-locked #plant-col {
      transform: translateX(-20vw);
      margin-left: 0;
      box-shadow: -4px 0 12px rgba(0,0,0,0.06);
    }

    #observations {
      padding: 40px 48px;
      width: 40vw;
      flex-shrink: 0;
      overflow-y: auto;
      position: relative;
      z-index: 1;
      background: #fff;
      box-shadow: -12px 0 40px rgba(0,0,0,0.14);
      transition: transform 0.5s cubic-bezier(0.34, 1.2, 0.64, 1);
    }

    #observations h2 {
      font-family: var(--font-serif);
      font-size: 22px;
      font-weight: 600;
      letter-spacing: normal;
      color: #222;
      margin-bottom: 28px;
    }

    #bed-plan {
      width: 100%;
    }

    #bed-plan svg {
      width: 100%;
      height: auto;
      display: block;
    }

    #bed-tooltip {
      position: fixed;
      pointer-events: none;
      background: #fff;
      border: 1px solid #000;
      padding: 6px 10px;
      font-size: 12px;
      line-height: 1.4;
      z-index: 200;
      display: none;
    }

    #bed-tooltip .tt-name { font-family: var(--font-serif); font-style: italic; font-size: 15px; }
    #bed-tooltip .tt-de { color: #555; }

    #plant-col {
      width: 40vw;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      margin-left: -10vw;
      z-index: 2;
      box-shadow: -12px 0 40px rgba(0,0,0,0.14);
      background: #fff;
      transition: transform 0.5s cubic-bezier(0.34, 1.2, 0.64, 1) 60ms, margin-left 0.5s cubic-bezier(0.34, 1.2, 0.64, 1) 60ms, box-shadow 0.4s ease 60ms;
    }

    #plant-col-title {
      font-family: var(--font-serif);
      font-size: 22px;
      font-weight: 600;
      letter-spacing: normal;
      color: #222;
    }

    #add-plant-btn.open { opacity: 0.7; }

    #add-plant-form {
      display: none;
      flex-direction: column;
      gap: 12px;
      padding: 20px 48px;
      border-bottom: 1px solid #000;
      background: #fafafa;
    }
    #add-plant-form.open { display: flex; }

    .apf-row { display: flex; gap: 16px; }
    .apf-field { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .apf-field.narrow { flex: 0 0 100px; }
    .apf-field > label { display: flex; align-items: baseline; gap: 6px; }
    .apf-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #aaa;
      text-transform: uppercase;
    }
    .apf-input {
      font-size: 13px;
      font-family: inherit;
      border: none;
      border-bottom: 1px solid #ccc;
      padding: 5px 0;
      outline: none;
      background: transparent;
      color: #222;
    }
    .apf-input:focus { border-bottom-color: #000; }
    .apf-input[type=color] {
      padding: 0;
      height: 28px;
      cursor: pointer;
      border: none;
      border-bottom: 1px solid #ccc;
    }
    .apf-actions { display: flex; gap: 8px; padding-top: 4px; }
    #apf-cancel {
      font-size: 11px;
      font-family: inherit;
      border: 1px solid #ccc;
      border-radius: 99px;
      padding: 5px 14px;
      cursor: pointer;
      background: #fff;
      color: #666;
      transition: border-color 0.15s, color 0.15s;
    }
    #apf-cancel:hover { border-color: #888; color: #222; }
    #apf-error {
      font-size: 11px;
      color: #c00;
      display: none;
    }



    /* Modal */
    #modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 400;
      align-items: center;
      justify-content: center;
    }
    #modal-backdrop.open { display: flex; }

    @keyframes modal-in {
      from { transform: scale(0.04); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    @keyframes modal-out {
      from { transform: scale(1);    opacity: 1; }
      to   { transform: scale(0.04); opacity: 0; }
    }

    #modal {
      background: #fff;
      border: none;
      width: 90vw;
      height: 90vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    #modal.opening { animation: modal-in  0.5s cubic-bezier(0.34, 1.2, 0.64, 1) forwards; }
    #modal.closing { animation: modal-out 0.22s ease-in forwards; }

    #modal-close {
      position: absolute;
      top: 16px;
      right: 20px;
      font-size: 32px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--modal-fg, #888);
      opacity: 0.6;
      line-height: 1;
      z-index: 10;
    }
    #modal-close:hover { opacity: 1; }

    #modal-columns {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #modal-info-toggle { display: none; }
    #modal-info-body { display: block; }

    #modal-info {
      width: 38%;
      flex-shrink: 0;
      padding: 40px 48px;
      overflow-y: auto;
      border-right: 1px solid rgba(128,128,128,0.2);
    }

    #modal-meta-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    #modal-invasiv-btn {
      background: none;
      border: none;
      font-size: 14px;
      cursor: pointer;
      color: var(--modal-fg, #000);
      opacity: 0.2;
      padding: 4px;
      flex-shrink: 0;
      transition: opacity 0.15s, background 0.15s, color 0.15s;
      line-height: 1;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #modal-invasiv-btn:hover { opacity: 0.5; }
    #modal-invasiv-btn.active { background: #ff0000; color: #fff; opacity: 1; }

    #modal-name {
      font-size: 100px;
      font-style: italic;
      font-weight: 600;
      font-family: var(--font-serif);
      color: var(--modal-fg, #000);
      line-height: 0.9;
      margin-bottom: 24px;
      padding-right: 48px;
      outline: none;
      cursor: text;
    }

    #modal-name:focus, #modal-de:focus {
      opacity: 0.8;
    }

    #modal-de {
      font-size: 14px;
      color: var(--modal-fg, #000);
      margin-bottom: 2px;
      outline: none;
      cursor: text;
    }

    #modal-family-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #modal-garden-badges {
      display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0 4px;
    }
    #modal-garden-badges:empty { display: none; }
    .modal-garden-badge {
      font-size: 11px; font-family: inherit; letter-spacing: 0.04em;
      padding: 3px 10px; border-radius: 99px;
      background: rgba(128,128,128,0.15); color: var(--modal-fg, #000);
      text-decoration: none; border: none; cursor: pointer;
      transition: background 150ms;
    }
    .modal-garden-badge:hover { background: rgba(128,128,128,0.3); }

    #modal-family {
      font-size: 11px;
      color: var(--modal-fg, #000);
      opacity: 0.6;
      background: none;
      border: none;
      outline: none;
      font-family: inherit;
      padding: 0;
      width: 120px;
    }
    #modal-family:hover, #modal-family:focus {
      opacity: 1;
      border-bottom: 1px solid currentColor;
    }

    #modal-color-swatch {
      width: 14px;
      height: 14px;
      border-radius: 2px;
      border: 1px solid rgba(128,128,128,0.3);
      cursor: pointer;
      flex-shrink: 0;
    }

    #modal-color-input {
      opacity: 0;
      position: absolute;
      width: 0;
      height: 0;
      pointer-events: none;
    }

    #modal-bloom-bar {
      margin-bottom: 28px;
    }

    #modal-bloom-bar-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--modal-fg, #000);
      opacity: 0.5;
      margin-bottom: 10px;
    }

    .bloom-bar-segments {
      display: flex;
      gap: 3px;
      margin-bottom: 5px;
    }

    .bloom-seg {
      flex: 1;
      height: 10px;
      border-radius: 99px;
      background: rgba(128,128,128,0.25);
      cursor: pointer;
      transition: background 0.15s;
    }
    .bloom-seg:hover { background: rgba(128,128,128,0.45); }
    .bloom-seg.active:hover { opacity: 0.7; }

    .bloom-seg.active {
      background: var(--modal-fg, #000);
    }

    .bloom-bar-labels {
      display: flex;
      gap: 3px;
    }

    .bloom-bar-labels span {
      flex: 1;
      text-align: center;
      font-size: 10px;
      color: var(--modal-fg, #000);
      opacity: 0.45;
    }

    #modal-stages-section {
      border-top: 1px solid rgba(128,128,128,0.2);
      padding-top: 16px;
      margin-bottom: 24px;
    }

    #modal-stages-toggle {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--modal-fg, #000);
      opacity: 0.4;
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
    }
    #modal-stages-toggle:hover { opacity: 0.7; }
    #modal-stages-toggle::after { content: '▴'; font-size: 9px; }
    #modal-stages-section.collapsed #modal-stages-toggle::after { content: '▾'; }
    #modal-stages-section.collapsed #modal-stages,
    #modal-stages-section.collapsed #modal-generated { display: none; }

    #modal-stages {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    #modal-plant-info {
      border-top: 1px solid rgba(128,128,128,0.2);
      padding-top: 20px;
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .plant-info-row {
      display: flex;
      gap: 12px;
      align-items: baseline;
    }

    .plant-info-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--modal-fg, #000);
      opacity: 0.5;
      width: 120px;
      flex-shrink: 0;
    }

    .plant-info-value {
      font-size: 12px;
      color: var(--modal-fg, #000);
      background: transparent;
      border: none;
      border-bottom: 1px solid transparent;
      outline: none;
      font-family: inherit;
      width: 100%;
      min-width: 40px;
      padding: 0;
    }

    .plant-info-value:hover { border-bottom-color: rgba(128,128,128,0.3); }
    .plant-info-value:focus { border-bottom-color: rgba(128,128,128,0.6); opacity: 0.8; }
    .plant-info-value::placeholder { opacity: 0.3; color: var(--modal-fg, #000); }
    body:not(.logged-in) .plant-info-value { pointer-events: none; }
    body:not(.logged-in) #modal-family { pointer-events: none; }

    .plant-info-unit {
      font-size: 11px;
      color: var(--modal-fg, #000);
      opacity: 0.4;
    }

    #modal-generated {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .modal-gen-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .modal-gen-item img {
      width: 100px;
      height: 100px;
      object-fit: contain;
      background: #f5f5f3;
      display: block;
    }

    .modal-gen-caption {
      font-size: 10px;
      color: #aaa;
      text-align: center;
    }

    .modal-stage-row {
      display: flex;
      gap: 16px;
      align-items: baseline;
    }

    .modal-stage-name {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--modal-fg, #000);
      opacity: 0.5;
      text-transform: uppercase;
      width: 72px;
      flex-shrink: 0;
    }

    .modal-stage-months {
      font-size: 12px;
      color: var(--modal-fg, #000);
    }

    #modal-images {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #obs-toggle-bar {
      flex-shrink: 0;
      padding: 40px 48px 16px;
      border-bottom: 1px solid rgba(128,128,128,0.2);
    }

    #obs-toggle-btn { background: var(--modal-fg, #000); color: var(--modal-bg, #fff); border-color: var(--modal-fg, #000); }

    #obs-form {
      display: none;
      flex-direction: column;
      gap: 14px;
      padding: 20px 48px;
      border-bottom: 1px solid #eee;
      flex-shrink: 0;
    }
    #obs-form.open { display: flex; }

    .obs-row { display: flex; gap: 12px; }
    .obs-field { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .obs-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #aaa;
      text-transform: uppercase;
    }

    .obs-input, .obs-select {
      font-size: 12px;
      font-family: inherit;
      border: none;
      border-bottom: 1px solid #ccc;
      padding: 4px 0;
      outline: none;
      background: transparent;
      color: #222;
    }
    .obs-input:focus, .obs-select:focus { border-bottom-color: #000; }

    .obs-textarea {
      font-size: 12px;
      font-family: inherit;
      border: 1px solid #eee;
      padding: 8px;
      outline: none;
      background: transparent;
      color: #222;
      resize: vertical;
      min-height: 64px;
    }
    .obs-textarea:focus { border-color: #ccc; }

    #obs-plant-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      max-height: 90px;
      overflow-y: auto;
    }

    .obs-plant-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-style: italic;
      color: #777;
      cursor: pointer;
      padding: 3px 7px;
      border: 1px solid #eee;
      border-radius: 2px;
      user-select: none;
    }
    .obs-plant-chip:hover { border-color: #bbb; color: #333; }
    .obs-plant-chip.checked { border-color: #000; color: #000; background: #f9f9f9; }
    .obs-plant-chip input { display: none; }

    .obs-plant-chip.pn-suggested { border-color:#bbb; color:#333; }
    .obs-plant-chip.pn-suggested.checked { border-color:#000; background:#f5f8f0; }
    .pn-score { font-style:normal; font-size:10px; opacity:0.45; margin-left:3px; }
    .obs-plant-chip.pn-identifying { color:#aaa; font-style:italic; border-color:#eee; cursor:default; pointer-events:none; }
    .obs-plant-chip.pn-new-plant { border-style:dashed; border-color:#bbb; color:#555; font-style:italic; background:none; font-size:11px; font-family:inherit; }
    .obs-plant-chip.pn-new-plant:hover { border-color:#000; color:#000; }
    .obs-plant-chip.pn-new-plant:disabled { opacity:0.4; cursor:default; }

    .obs-file-label {
      font-size: 11px;
      color: #888;
      border: 1px dashed #ccc;
      padding: 8px 12px;
      cursor: pointer;
      text-align: center;
    }
    .obs-file-label:hover { border-color: #888; color: #444; }
    .obs-file-label.has-file { border-color: #000; color: #222; border-style: solid; }

    .obs-form-actions { display: flex; gap: 8px; }

    #obs-cancel {
      font-size: 11px;
      font-family: inherit;
      border: 1px solid #ccc;
      border-radius: 99px;
      padding: 5px 14px;
      cursor: pointer;
      background: #fff;
      color: #666;
      transition: border-color 0.15s, color 0.15s;
    }
    #obs-cancel:hover { border-color: #888; color: #222; }

    #obs-list {
      flex: 1;
      overflow-y: auto;
      padding: 24px 48px;
      position: relative;
    }

    .obs-card {
      position: absolute;
    }

    .obs-card-thumb {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
      cursor: zoom-in;
    }

    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 10001;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; }

    #lightbox img {
      max-width: 95vw;
      max-height: 95vh;
      object-fit: contain;
      display: block;
    }

    .obs-card-thumb-empty { display: none; }

    .obs-card-label {
      padding: 6px 8px;
      font-size: 11px;
      color: var(--modal-fg, #000);
      line-height: 1.3;
    }

    .obs-card-label-date { font-weight: 600; }

    .obs-card-label-plants {
      font-family: var(--font-serif);
      font-style: italic;
      opacity: 0.6;
    }

    .obs-card-text {
      font-size: 11px;
      color: var(--modal-fg, #000);
      padding: 6px 8px;
      line-height: 1.4;
    }
    .obs-card-gps {
      font-size: 10px;
      color: #888;
      padding: 2px 8px 6px;
      font-variant-numeric: tabular-nums;
    }

    .obs-card-edit {
      position: absolute;
      bottom: 6px;
      right: 34px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(0,0,0,0.55);
      border: none;
      color: #fff;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .obs-card:hover .obs-card-edit { opacity: 1; }
    .obs-card-edit:hover { background: rgba(0,0,0,0.8); }

    .obs-card-delete {
      position: absolute;
      bottom: 6px;
      right: 6px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(0,0,0,0.55);
      border: none;
      color: #fff;
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .obs-card:hover .obs-card-delete { opacity: 1; }
    .obs-card-delete:hover { background: rgba(180,0,0,0.8); }

    .obs-plant-tag {
      font-size: 10px;
      font-style: italic;
      color: #888;
      border: 1px solid #eee;
      padding: 1px 5px;
      border-radius: 2px;
    }

    .obs-empty {
      font-size: 12px;
      color: #bbb;
      padding: 24px 0;
      text-align: center;
    }

@media (max-width: 768px) {
      #content { flex-direction: column; }
      #garden-description, #observations { width: 100%; border-right: none; border-bottom: 1px solid #000; }
    }

    #content { opacity: 0; }
    #content.ready { opacity: 1; transition: opacity 0.4s ease; }

    #index-heading { display: none; }
    #garden-list   { display: none; }
    body.index-mode #index-heading {
      display: block;
      font-family: var(--font-serif);
      font-size: 100px;
      font-weight: 600;
      line-height: 1;
      padding: 40px 48px 16px;
    }
    body.index-mode #garden-list {
      display: block;
      list-style: disc;
      padding: 0 48px 28px 68px;
      font-size: 16px;
    }
    body.index-mode #garden-list a {
      color: #222;
      text-decoration: none;
    }
    body.index-mode #garden-list a:hover { text-decoration: underline; }

    #garden-section  { display: none; }
    #obs-carousel-section { display: none; }
    body.index-mode #garden-section,
    body.index-mode #obs-carousel-section { display: block; }

    /* Shared separator for all three index sections */
    body.index-mode #garden-section::before,
    body.index-mode #obs-carousel-section::before {
      content: '';
      display: block;
      border-top: 1px solid #000;
      margin: 0 48px 24px;
    }
    body.index-mode #plant-col-header::before {
      content: '';
      display: block;
      border-top: 1px solid #000;
      margin: 0 0 24px;
    }

    /* Shared section header structure */
    #garden-section-header {
      padding: 0 48px;
      margin-bottom: 16px;
    }
    #garden-section-title {
      font-family: var(--font-serif);
      font-size: 22px;
      font-weight: 600;
      color: #222;
    }
    body.index-mode #plant-col-header {
      padding: 0 48px;
    }
    body.index-mode #plant-col-header-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    body.index-mode #plant-filter {
      display: block;
      width: calc(100% - 96px);
      margin: 0 48px;
    }
    #obs-carousel-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 0 48px;
      margin-bottom: 16px;
    }
    #obs-carousel-title {
      font-family: var(--font-serif);
      font-size: 22px;
      font-weight: 600;
      letter-spacing: normal;
      color: #222;
    }
    #obs-carousel {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 0 48px 32px;
      scrollbar-width: none;
    }
    body.index-mode #obs-carousel::-webkit-scrollbar { display: none; }
    .carousel-item {
      flex-shrink: 0;
      width: 160px;
      display: flex;
      flex-direction: column;
      background: #fff;
    }
    .carousel-item-img {
      width: 160px;
      height: 240px;
      overflow: hidden;
      flex-shrink: 0;
      background: #f0f0f0;
      cursor: zoom-in;
    }
    .carousel-item-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.2s ease;
    }
    .carousel-item:hover .carousel-item-img img { transform: scale(1.04); }
    .carousel-item-meta {
      padding: 6px 6px 4px;
      font-size: 10px;
      line-height: 1.35;
      min-height: 32px;
    }
    .carousel-item-date {
      font-weight: 600;
      color: #222;
    }
    .carousel-item-gps {
      font-size: 10px;
      color: #888;
      font-variant-numeric: tabular-nums;
    }
    .carousel-item-plants {
      font-family: var(--font-serif);
      font-style: italic;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .carousel-item-btns {
      display: flex;
      gap: 4px;
      padding: 0 6px 8px;
    }
    .carousel-item-edit, .carousel-item-del {
      flex: 1;
      height: 22px;
      border: 1px solid #ddd;
      background: #fff;
      color: #666;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, color 0.12s;
    }
    .carousel-item-edit:hover { background: #222; color: #fff; border-color: #222; }
    .carousel-item-del:hover  { background: #c00; color: #fff; border-color: #c00; }

    body.index-mode #garden-description,
    body.index-mode #observations { display: none; }
    body.index-mode #panels-area { pointer-events: none; }
    html:has(body.index-mode),
    body.index-mode {
      overflow-y: auto;
      height: auto;
    }
    body.index-mode #content {
      overflow: visible;
      height: auto;
    }
    body.index-mode #plant-col {
      width: 100vw;
      margin-left: 0;
      box-shadow: none;
      transform: none !important;
      pointer-events: auto;
      overflow: visible;
      height: auto;
    }

    #landing {
      display: none;
      flex-direction: column;
      align-items: flex-start;
      padding: 80px 48px;
      gap: 12px;
      opacity: 0;
    }
    #landing.ready { display: flex; opacity: 1; transition: opacity 0.4s ease; }

    .landing-card {
      display: block;
      text-decoration: none;
      color: inherit;
      border: 1px solid #000;
      padding: 24px 32px;
      transition: background 0.15s;
    }
    .landing-card:hover { background: #000; color: #fff; }
    .card-name {
      font-family: var(--font-serif);
      font-style: italic;
    }
    .landing-card-name {
      font-family: var(--font-serif);
      font-size: 32px;
      font-weight: 600;
      font-style: italic;
    }

    #loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }
    #loader-text {
      font-family: var(--font-serif);
      font-size: 22px;
      font-style: italic;
      font-weight: 600;
      color: #ccc;
    }

    @media (max-width: 767px) {
      html, body  { height: auto; overflow: auto; }
      #content    { overflow: visible; height: auto; }
      #modal-name { font-size: 72px; }
      body.index-mode #plant-col { overflow: visible; height: auto; width: 100%; margin-left: 0; box-shadow: none; transform: none !important; }
      body.index-mode #plant-grid { overflow: visible; height: auto; }
      body.index-mode #index-heading { font-size: 52px; padding: 32px 20px 12px; }
      body.index-mode #garden-list { padding: 0 20px 20px 36px; }
      #garden-section-header { padding: 0 20px; }
      #obs-carousel-header { padding: 0 20px; }
      body.index-mode #obs-carousel { padding: 0 20px 24px; }
      body.index-mode #garden-section::before,
      body.index-mode #obs-carousel-section::before { margin: 0 20px 16px; }
      body.index-mode #plant-col-header { padding: 0 20px; }
      body.index-mode #plant-filter { width: calc(100% - 40px); margin: 0; }
      .carousel-item { width: 120px; }
      .carousel-item-img { width: 120px; height: 180px; }

      /* Modal: stack info above observations */
      #modal { width: 100vw; height: 100dvh; }
      #modal-columns { flex-direction: column; overflow-y: auto; }
      #modal-info { width: 100%; flex-shrink: 0; border-right: none; border-bottom: 1px solid rgba(128,128,128,0.2); padding: 32px 24px 8px; overflow-y: visible; }
      #modal-info-toggle { display: flex; align-items: center; justify-content: space-between; width: 100%; background: none; border: none; border-top: 1px solid rgba(128,128,128,0.15); padding: 14px 0; font-size: 12px; font-family: inherit; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--modal-fg, #000); opacity: 0.5; cursor: pointer; }
      #modal-info-toggle:hover { opacity: 0.8; }
      #modal-info-body { display: none; padding-bottom: 20px; }
      #modal-info-body.open { display: block; }
      #modal-images { overflow: visible; }
      #obs-toggle-bar { padding: 24px 24px 16px; }
      #obs-form { padding: 16px 24px; }
      #obs-list { padding: 16px 24px; }
    }
  </style>
</head>
<body>
  <!-- ── Hamburger menu ──────────────────────────────────────────────────── -->
  <button id="hamburger-btn" aria-label="Menü">
    <span></span><span></span><span></span>
  </button>
  <div id="menu-backdrop"></div>
  <div id="menu-panel">
    <div id="menu-user-email"></div>
    <div id="menu-profile" style="display:none;margin-top:12px;">
      <input id="menu-username" type="text" placeholder="Benutzername" autocomplete="off"
        style="width:100%;border:none;border-bottom:1px solid #ccc;padding:4px 0;font-size:13px;font-family:inherit;outline:none;background:transparent;">
      <button id="menu-username-save" class="action-btn" style="margin-top:8px;width:100%;">Speichern</button>
    </div>
    <button id="add-garden-btn" class="action-btn" style="margin-top:12px;width:100%;display:none;">+ Garten</button>
    <button id="menu-my-obs-btn" class="action-btn" style="margin-top:12px;width:100%;">Meine Beobachtungen</button>
    <button id="menu-login-btn" class="action-btn" style="margin-top:12px;">Anmelden</button>
    <button id="menu-logout-btn" class="action-btn" style="display:none;margin-top:12px;">Abmelden</button>
  </div>

  <!-- ── Login modal (magic link) ──────────────────────────────────────── -->
  <div id="login-backdrop">
    <div id="login-modal">
      <button id="login-close">×</button>
      <div id="login-title">Anmelden / Registrieren</div>
      <div id="login-body">
        <p style="font-size:13px;color:#555;margin:0 0 12px">E-Mail eingeben — wir schicken dir einen Link. Neues Konto wird automatisch erstellt.</p>
        <input id="login-email" type="email" placeholder="E-Mail-Adresse" autocomplete="email">
        <button id="login-submit" class="action-btn">Magic Link senden</button>
        <div id="login-msg"></div>
      </div>
    </div>
  </div>

  <!-- ── Add garden modal ──────────────────────────────────────────────── -->
  <div id="add-garden-backdrop">
    <div id="add-garden-modal">
      <button id="add-garden-close">×</button>
      <div id="add-garden-title">Garten anlegen</div>
      <div id="add-garden-form-body">
        <div class="agf-field">
          <label class="agf-label" for="agf-name">Name</label>
          <input id="agf-name" class="agf-input" type="text" autocomplete="off" placeholder="Mein Garten">
        </div>
        <div class="agf-field">
          <label class="agf-label" for="agf-path">Pfad (URL)</label>
          <input id="agf-path" class="agf-input" type="text" autocomplete="off" placeholder="mein-garten">
        </div>
        <div class="agf-field">
          <label class="agf-label" for="agf-desc">Beschreibung</label>
          <textarea id="agf-desc" class="agf-input agf-textarea" placeholder="Optional…"></textarea>
        </div>
        <label class="agf-check">
          <input id="agf-private" type="checkbox">
          Privat (nur für mich sichtbar)
        </label>
        <label class="agf-check">
          <input id="agf-plan" type="checkbox">
          Mit Bettplan
        </label>
        <div id="add-garden-msg"></div>
        <button id="add-garden-submit" class="action-btn">Garten erstellen</button>
      </div>
    </div>
  </div>

  <div id="quick-obs-backdrop" style="display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.4);align-items:center;justify-content:center;">
    <div style="background:#fff;position:relative;width:min(520px,92vw);padding:48px 40px 40px;max-height:90vh;overflow-y:auto;">
      <button id="quick-obs-close" style="position:absolute;top:12px;right:16px;font-size:28px;line-height:1;background:none;border:none;cursor:pointer;color:#888;">×</button>
      <div id="qo-title" style="font-family:var(--font-serif);font-size:40px;font-weight:600;line-height:1;margin-bottom:32px;">Beobachtung</div>
      <div class="obs-row">
        <div class="obs-field">
          <label class="obs-label">Datum</label>
          <input id="qo-date" class="obs-input" type="date">
        </div>
        <div class="obs-field">
          <label class="obs-label">Typ</label>
          <select id="qo-type" class="obs-select">
            <option value="foto">Foto</option>
            <option value="zeichnung">Zeichnung</option>
            <option value="herbarbeleg">Herbarbeleg</option>
            <option value="notiz">Notiz</option>
          </select>
        </div>
        <div class="obs-field">
          <label class="obs-label">Garten</label>
          <select id="qo-garden" class="obs-select"></select>
        </div>
      </div>
      <div class="obs-field">
        <label class="obs-file-label" id="qo-file-label">
          <span id="qo-file-text">Bild auswählen…</span>
          <input id="qo-file" type="file" accept=".jpg,.jpeg,.png,.webp,.heic,.gif" style="display:none">
        </label>
      </div>
      <div class="obs-field">
        <label class="obs-label">Pflanzen</label>
        <div id="qo-plant-grid"></div>
      </div>
      <div class="obs-field">
        <label class="obs-label">Notiz</label>
        <textarea id="qo-text" class="obs-textarea" placeholder="Beobachtung, Beschreibung…"></textarea>
      </div>
      <div id="qo-msg" style="font-size:13px;color:#c00;min-height:18px;"></div>
      <div class="obs-form-actions">
        <button id="qo-submit" class="action-btn">Speichern</button>
        <button id="qo-cancel">Abbrechen</button>
      </div>
    </div>
  </div>

  <div id="loader"><span id="loader-text">Blühende Gärten</span></div>
  <div id="landing"></div>
  <div id="content">
    <div id="garden-description">
      <div id="garden-big-title" style="font-family:var(--font-serif);font-size:100px;font-weight:600;line-height:1;margin-bottom:40px;">Der Große Garten</div>
      <div id="garden-title"></div>
      <div id="garden-bar"></div>
      <div style="display:flex;gap:8px;margin-bottom:16px;">
        <button id="all-herbar-btn" style="font-size:11px;font-family:inherit;color:#888;background:none;border:1px solid #ddd;border-radius:20px;padding:5px 14px;cursor:pointer;transition:all 0.15s;">Herbarbelege</button>
        <button id="all-obs-btn" style="font-size:11px;font-family:inherit;color:#888;background:none;border:1px solid #ddd;border-radius:20px;padding:5px 14px;cursor:pointer;transition:all 0.15s;">Beobachtungen</button>
      </div>
      <div id="garden-info"></div>
    </div>
    <div id="panels-area">
    <div id="observations">
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:28px;">
        <h2 style="margin-bottom:0;font-family:var(--font-serif);letter-spacing:normal;font-weight:600;">Plan</h2>
        <button id="edit-mode-btn" class="action-btn">Bearbeiten</button>
      </div>
      <div id="bed-plan-bar">
        <select id="version-select-plan"></select>
        <span id="selected-plant-label">Keine Pflanze gewählt</span>
        <div id="density-ctrl" style="display:none;align-items:center;gap:6px;margin-left:8px;">
          <button class="density-btn" id="density-dec" style="font-size:13px;line-height:1;border:1px solid #ccc;background:#fff;width:22px;height:22px;cursor:pointer;">−</button>
          <span id="density-val" style="font-size:11px;min-width:16px;text-align:center;"></span>
          <button class="density-btn" id="density-inc" style="font-size:13px;line-height:1;border:1px solid #ccc;background:#fff;width:22px;height:22px;cursor:pointer;">+</button>

  <script type="module">
    import { supabase, authedFetch } from '/src/auth.js';

    const base = import.meta.env.BASE_URL;

    // ── Auth state ────────────────────────────────────────────────────────────
    let _currentUser = null;
    supabase.auth.getSession().then(({ data: { session } }) => {
      _currentUser = session?.user ?? null;
      updateAuthUI();
    });
    supabase.auth.onAuthStateChange((_event, session) => {
      _currentUser = session?.user ?? null;
      updateAuthUI();
    });

    function updateAuthUI() {
      const emailEl = document.getElementById('menu-user-email');
      const loginBtn = document.getElementById('menu-login-btn');
      const logoutBtn = document.getElementById('menu-logout-btn');
      const loggedIn = !!_currentUser;
      document.body.classList.toggle('logged-in', loggedIn);
      if (loggedIn) {
        if (emailEl) emailEl.textContent = _currentUser.email;
        if (loginBtn) loginBtn.style.display = 'none';
        if (logoutBtn) logoutBtn.style.display = 'block';
      } else {
        if (emailEl) emailEl.textContent = '';
        if (loginBtn) loginBtn.style.display = 'block';
        if (logoutBtn) logoutBtn.style.display = 'none';
      }
      const ce = loggedIn ? 'true' : 'false';
      document.getElementById('modal-name')?.setAttribute('contenteditable', ce);
      document.getElementById('modal-de')?.setAttribute('contenteditable', ce);
      const modalFamily = document.getElementById('modal-family');

      document.getElementById('menu-profile').style.display = loggedIn ? 'block' : 'none';
      document.getElementById('add-garden-btn').style.display = loggedIn ? 'block' : 'none';
      if (loggedIn) loadProfile();
    }

    async function loadProfile() {

    // ── Add garden modal ──────────────────────────────────────────────────────
    function slugify(str) {
      return str.toLowerCase()
        .replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss')
        .replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
    }

    function openAddGardenModal() {
      document.getElementById('agf-name').value = '';

    document.getElementById('add-garden-submit').addEventListener('click', async () => {
      const name = document.getElementById('agf-name').value.trim();
      const path = document.getElementById('agf-path').value.trim();
      const description = document.getElementById('agf-desc').value.trim();
      const is_private = document.getElementById('agf-private').checked;
      const has_plan = document.getElementById('agf-plan').checked;

      if (!name) { msg.textContent = 'Name ist erforderlich.'; return; }
      if (!path)  { msg.textContent = 'Pfad ist erforderlich.'; return; }

      const btn = document.getElementById('add-garden-submit');
      btn.disabled = true;
      msg.textContent = '';

      const id = crypto.randomUUID();
      const res = await authedFetch('/api/gardens', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, path, name, description: description || null, is_private, has_plan, plants: [] }),
      });
      const data = await res.json();
      btn.disabled = false;

      if (!res.ok) { msg.textContent = data.error ?? 'Fehler beim Erstellen.'; return; }
      closeAddGardenModal();
      window.location.href = '/' + path;
    });

    async function resizeToDataUrl(file, maxPx = 800) {
      return new Promise(resolve => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          let { width: w, height: h } = img;
          if (w > maxPx || h > maxPx) {
            if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
            else { w = Math.round(w * maxPx / h); h = maxPx; }
          }
          const c = document.createElement('canvas');
          c.width = w; c.height = h;
          c.getContext('2d').drawImage(img, 0, 0, w, h);
          URL.revokeObjectURL(url);
          resolve(c.toDataURL('image/jpeg', 0.8));
        };
        img.onerror = () => { URL.revokeObjectURL(url); resolve(null); };
        img.src = url;
      });
    }

    async function identifyPlant(file) {
      const grid = document.getElementById('qo-plant-grid');
      const placeholder = document.createElement('label');
      placeholder.className = 'obs-plant-chip pn-identifying';
      placeholder.textContent = 'Erkenne…';
      grid.prepend(placeholder);
      try {
        const dataUrl = await resizeToDataUrl(file);
        if (!dataUrl) { placeholder.remove(); return; }
        const data = await authedFetch('/api/plantnet', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ dataUrl }),
        }).then(r => r.json());
        const suggestions = (data.results ?? []).map(r => ({
          name: r.name, score: r.score, family: r.family ?? null, slug: _plantNetToSlug(r.name),
        }));
        const preselected = [...grid.querySelectorAll('input:checked')].map(i => i.value);
        buildQoPlantGrid(preselected, suggestions);
      } catch { placeholder.remove(); }
    }

    async function uploadToR2(file) {
      const { url, key } = await authedFetch('/api/upload-url', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contentType: file.type, filename: file.name }),
      }).then(r => r.json());
      await fetch(url, { method: 'PUT', body: file, headers: { 'Content-Type': file.type } });
      return key;
    }
    const [all, gardens] = await Promise.all([
      fetch(base + 'plants/manifest.json').then(r => r.json()),
      fetch('/api/gardens').then(r => r.json()),
    ]);

    const _urlPath = window.location.pathname.replace(/^\/|\/$/g, '');
    const _activeGardenId = gardens.find(g => (g.path ?? g.id) === _urlPath)?.id ?? null;

    // one entry per slug (bloom stage preferred)
    const bySlug = new Map();
    // all stages per slug
    const stagesBySlug = new Map();
    for (const e of all) {
      if (!bySlug.has(e.slug) || e.stage === 'bloom') bySlug.set(e.slug, e);
      if (!stagesBySlug.has(e.slug)) stagesBySlug.set(e.slug, []);
      stagesBySlug.get(e.slug).push(e);
    }

    // reverse lookup: scientific name / genus (lowercase) → slug
    const _plantByScientific = new Map();
    for (const [slug, p] of bySlug) {
      _plantByScientific.set(p.name.toLowerCase(), slug);
      const genus = p.name.split(' ')[0].toLowerCase();
      if (!_plantByScientific.has(genus)) _plantByScientific.set(genus, slug);
    }
    function _plantNetToSlug(name) {
      const lower = name.toLowerCase();
      return _plantByScientific.get(lower) ?? _plantByScientific.get(lower.split(' ')[0]) ?? null;
    }

    const MONTH_NAMES = {
      january:'Jan', february:'Feb', march:'Mär', april:'Apr',
      may:'Mai', june:'Jun', july:'Jul', august:'Aug',
      september:'Sep', october:'Okt', november:'Nov', december:'Dez',
    };

    // ── Modal ─────────────────────────────────────────────────────────────────
    const backdrop = document.getElementById('modal-backdrop');
    let _modalSlug = null;

    const STAGES = ['sprout', 'foliage', 'bloom', 'seed', 'dried'];

    const TYPE_LABELS_OBS = { foto: 'Foto', zeichnung: 'Zeichnung', herbarbeleg: 'Herbarbeleg', notiz: 'Notiz' };

    function renderGeneratedImages(slug) {
      const gen = document.getElementById('modal-generated');
      gen.innerHTML = '';
      for (const stage of STAGES) {
        const src = `${base}plants/${slug}_${stage}.png`;
        const item = document.createElement('div');
        item.className = 'modal-gen-item';
        item.innerHTML = `
          <img src="${src}" onerror="this.parentElement.style.display='none'">
          <span class="modal-gen-caption">${stage}</span>
        `;
        gen.appendChild(item);
      }
    }

    const obsCache = new Map();
    const plantInfoCache = new Map();

    const _placeCache = new Map();
    const _placeQueue = [];
    let _placeRunning = false;
    async function _runPlaceQueue() {
      _placeRunning = true;
      while (_placeQueue.length) {
        const { key, lat, lon, resolve } = _placeQueue.shift();
        if (_placeCache.has(key)) { resolve(_placeCache.get(key)); continue; }
        try {
          const d = await fetch(
            `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=13&accept-language=de`,
            { headers: { 'User-Agent': 'Bluehendegaerten/1.0' } }
          ).then(r => r.json());
          const a = d.address ?? {};
          const district = a.suburb || a.neighbourhood || a.quarter || a.borough || a.city_district;
          const city = a.city || a.town || a.village || a.county || a.state;
          const place = district && city ? `${district}, ${city}` : district || city || '';
          _placeCache.set(key, place);
          resolve(place);
        } catch { resolve(''); }
        await new Promise(r => setTimeout(r, 1100));
      }
      _placeRunning = false;
    }
    function getPlace(lat, lon) {
      const key = `${lat.toFixed(2)},${lon.toFixed(2)}`;
      if (_placeCache.has(key)) return Promise.resolve(_placeCache.get(key));
      return new Promise(resolve => {
        const existing = _placeQueue.find(q => q.key === key);
        if (existing) { const orig = existing.resolve; existing.resolve = v => { orig(v); resolve(v); }; return; }
        _placeQueue.push({ key, lat, lon, resolve });
        if (!_placeRunning) _runPlaceQueue();
      });
    }

    function thumbUrl(filename) {
      if (!filename) return null;
      return `/api/thumb/${filename}`;
    }

    function buildObsCard(o, { onEdit, onDelete } = {}) {
      const card = document.createElement('div');
      card.className = 'obs-card';
      const plantNames = o.slugs.map(s => bySlug.get(s)?.name).filter(Boolean).join(', ');
      const thumb = thumbUrl(o.filename);
      card.innerHTML = `
        ${o.filename ? `<img class="obs-card-thumb" src="${thumb}" onerror="this.src='${R2_URL}/${o.filename}'">` : ''}
        ${plantNames ? `<div class="obs-card-label"><div class="obs-card-label-plants">${plantNames}</div></div>` : ''}
        ${o.text ? `<div class="obs-card-text">${o.text}</div>` : ''}
        ${o.lat != null ? `<div class="obs-card-gps"></div>` : ''}
        ${onEdit ? `<button class="obs-card-edit" title="Bearbeiten">✎</button>` : ''}
        ${onDelete ? `<button class="obs-card-delete" title="Löschen">×</button>` : ''}
      `;
      if (o.lat != null) {
        const el = card.querySelector('.obs-card-gps');
        if (o.place) { if (el) el.textContent = o.place; }
        else getPlace(o.lat, o.lon).then(p => {
          if (el && p) el.textContent = p;
          if (p) authedFetch(`/api/observations/${o.id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ place: p }) }).catch(() => {});
        });
      }
      if (onEdit) card.querySelector('.obs-card-edit').addEventListener('click', onEdit);
      if (onDelete) card.querySelector('.obs-card-delete').addEventListener('click', onDelete);
      return card;
    }

    async function renderObservations(slug) {
      const list = document.getElementById('obs-list');
      list.innerHTML = '';
      try {
        const obs = obsCache.has(slug)
          ? obsCache.get(slug)
          : await fetch(`/api/observations?slug=${slug}`).then(r => r.json());
        obsCache.set(slug, obs);
        if (!obs.length) {
          list.innerHTML = '<div class="obs-empty">Noch keine Beobachtungen</div>';
          return;
        }
        const cols = window.innerWidth < 768 ? 2 : 3;
        for (const o of obs) {
          const card = buildObsCard(o, {
            onEdit: _currentUser ? () => {
              _editingObsId = o.id;
              document.getElementById('obs-date').value = o.date ?? '';
              document.getElementById('obs-type').value = o.type ?? 'foto';
              document.getElementById('obs-text').value = o.text ?? '';
              buildPlantGrid(_modalSlug);
              o.slugs.forEach(s => {
                const cb = document.querySelector(`#obs-plant-grid input[value="${s}"]`);
                if (cb) cb.checked = true;
              });
              obsForm.classList.add('open');
              obsToggle.classList.add('open');
              obsToggle.textContent = '× Abbrechen';
              document.getElementById('obs-toggle-bar').scrollIntoView({ behavior: 'smooth', block: 'start' });
            } : null,
            onDelete: _currentUser ? async () => {
              if (!confirm('Eintrag wirklich löschen?')) return;
              await authedFetch(`/api/observations/${o.id}`, { method: 'DELETE' });
              obsCache.delete(_modalSlug);
              await renderObservations(_modalSlug);
            } : null,
          });
          if (o.filename) card.querySelector('img').addEventListener('load', () => masonryLayout(list, cols));
          list.appendChild(card);
        }
        masonryLayout(list, cols);
      } catch {
        list.innerHTML = '<div class="obs-empty">Server nicht erreichbar</div>';
      }

    function masonryLayout(list, cols = 3) {
      const cards = [...list.querySelectorAll('.obs-card')];
      if (!cards.length) return;
      const COLS = cols;
      const GAP = 8;
      const PAD = 16;
      const colW = (list.clientWidth - PAD * 2 - GAP * (COLS - 1)) / COLS;
      const colH = new Array(COLS).fill(0);
      cards.forEach(card => {
        card.style.width = colW + 'px';
        const col = colH.indexOf(Math.min(...colH));
        card.style.left = (PAD + col * (colW + GAP)) + 'px';
        card.style.top = (PAD + colH[col]) + 'px';
        colH[col] += card.offsetHeight + GAP;
      });
      // spacer drives scrollHeight — absolute cards don't contribute to it
      let spacer = list.querySelector('.masonry-spacer');
      if (!spacer) {
        spacer = document.createElement('div');
        spacer.className = 'masonry-spacer';
        spacer.style.cssText = 'pointer-events:none';
        list.appendChild(spacer);
      }
      spacer.style.height = (PAD + Math.max(...colH)) + 'px';
    }

    function contrastColor(hex) {
      const c = hex?.replace('#', '') ?? 'ffffff';
      const r = parseInt(c.slice(0,2),16), g = parseInt(c.slice(2,4),16), b = parseInt(c.slice(4,6),16);
      // WCAG relative luminance
      const lum = ([r,g,b].map(v => { v /= 255; return v <= 0.03928 ? v/12.92 : Math.pow((v+0.055)/1.055,2.4); }));
      return (0.2126*lum[0] + 0.7152*lum[1] + 0.0722*lum[2]) > 0.179 ? '#000' : '#fff';
    }

    function parseCm(val) {
      if (!val) return null;
      const s = String(val).trim();
      const range = s.match(/^(\d+(?:\.\d+)?)\s*[-–]\s*(\d+(?:\.\d+)?)$/);
      if (range) return (parseFloat(range[1]) + parseFloat(range[2])) / 2;
      return parseFloat(s) || null;
    }

    function buildQoPlantGrid(preselectedSlugs = [], suggestions = []) {
      const grid = document.getElementById('qo-plant-grid');
      grid.innerHTML = '';
      const matched   = suggestions.filter(s => s.slug);
      const unmatched = suggestions.filter(s => !s.slug);
      const suggestedSlugs = matched.map(s => s.slug);
      const scoreMap = new Map(matched.map(s => [s.slug, s.score]));

      // Unmatched suggestions — "add new plant" buttons
      unmatched.forEach(s => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'obs-plant-chip pn-new-plant';
        btn.innerHTML = `+ <em>${s.name}</em><span class="pn-score">${s.score}%</span>`;
        btn.title = 'Als neue Pflanze hinzufügen';
        btn.addEventListener('click', async () => {
          btn.disabled = true;
          btn.textContent = 'Wird hinzugefügt…';
          const current = [...grid.querySelectorAll('input:checked')].map(i => i.value);
          await addPlantFromPlantNet(s, suggestions, current);
        });
        grid.appendChild(btn);
      });

      // Matched suggestions first, then rest alphabetically
      const suggestedPlants = suggestedSlugs.map(sl => bySlug.get(sl)).filter(Boolean);
      const rest = [...bySlug.values()]
        .filter(p => !suggestedSlugs.includes(p.slug))
        .sort((a, b) => a.name.localeCompare(b.name));

      [...suggestedPlants, ...rest].forEach(p => {
        const isSuggested = suggestedSlugs.includes(p.slug);
        const checked = preselectedSlugs.includes(p.slug) || (isSuggested && !preselectedSlugs.length);
        const score = scoreMap.get(p.slug);
        const chip = document.createElement('label');
        chip.className = 'obs-plant-chip' + (checked ? ' checked' : '') + (isSuggested ? ' pn-suggested' : '');
        chip.innerHTML = `<input type="checkbox" value="${p.slug}"${checked ? ' checked' : ''}>${p.name}${score != null ? `<span class="pn-score">${score}%</span>` : ''}`;
        chip.querySelector('input').addEventListener('change', e => chip.classList.toggle('checked', e.target.checked));
        grid.appendChild(chip);
      });
    }

    async function addPlantFromPlantNet(suggestion, allSuggestions, currentPreselected) {
      const slug = toSlug(suggestion.name);
      const garden = document.getElementById('qo-garden')?.value || activeGarden || 'betonbeete';
      try {
        const res = await authedFetch('/api/custom-plants', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ slug, name: suggestion.name, family: suggestion.family ?? null, garden }),
        });
        const p = await res.json();
        if (!res.ok && p.error !== 'slug already exists') { alert(p.error); return; }
        const finalSlug = p.slug ?? slug;
        const entry = { slug: finalSlug, name: suggestion.name, family: suggestion.family ?? null, _custom: true };
        bySlug.set(finalSlug, entry);
        if (!stagesBySlug.has(finalSlug)) stagesBySlug.set(finalSlug, []);
        _plantByScientific.set(suggestion.name.toLowerCase(), finalSlug);
        const genus = suggestion.name.split(' ')[0].toLowerCase();
        if (!_plantByScientific.has(genus)) _plantByScientific.set(genus, finalSlug);
        const updatedSuggestions = allSuggestions.map(s => s.name === suggestion.name ? { ...s, slug: finalSlug } : s);
        buildQoPlantGrid([...currentPreselected, finalSlug], updatedSuggestions);
      } catch (e) { alert('Fehler: ' + e.message); }
    }

    // ── Bed plan ─────────────────────────────────────────────────────────────────
    const BED_L = 9, BED_GAP = 0.5;
    const bedWidths = [1.5, 1.5, 1.5, 1.5, 3.0, 1.5, 1.5, 1.5, 3.0];
    const totalZ = bedWidths.reduce((a, b) => a + b, 0) + BED_GAP * (bedWidths.length - 1);
    const bedLayout = (() => {
      let cursor = -totalZ / 2;
      return bedWidths.map((w, i) => {
        const z = cursor + w / 2;
        cursor += w + BED_GAP;
        return { w, z, i };
      });
    })();

    function inBed(sx, sz) {
      return Math.abs(sx) <= BED_L / 2 - 0.01 &&
        bedLayout.some(bed => sz >= bed.z - bed.w / 2 + 0.01 && sz <= bed.z + bed.w / 2 - 0.01);
    }

    function svgWorldCoords(e) {
      const svg = document.querySelector('#bed-plan svg');
      if (!svg) return null;
      const rect = svg.getBoundingClientRect();
      const vb   = svg.viewBox.baseVal;
      return {
        x: (e.clientX - rect.left) / rect.width  * vb.width  + vb.x,
        z: (e.clientY - rect.top)  / rect.height * vb.height + vb.y,
      };
    }

const colorBySlug = () => Object.fromEntries([...bySlug.values()].map(p => [p.slug, p.color ?? '#ccc']));

    let bedImages = {}; // bed_index → filename

    async function loadBedImages() {
      try {
        const rows = await fetch(`/api/bed-images?garden=${activeGarden}`).then(r => r.json());
        bedImages = Object.fromEntries(rows.map(r => [r.bed_index, r.filename]));
      } catch {}
    }

    function renderBedPlan() {
      const PAD = 0.15;
      const vbX = -BED_L / 2 - PAD;
      const vbY = -totalZ / 2 - PAD;
      const vbW = BED_L + PAD * 2;
      const vbH = totalZ + PAD * 2;
      const colors = colorBySlug();

      let svg = `<svg viewBox="${vbX} ${vbY} ${vbW} ${vbH}" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">`;

      for (const bed of bedLayout) {
        const x0 = -BED_L / 2;
        const z0 = bed.z - bed.w / 2;
        svg += `<rect x="${x0}" y="${z0}" width="${BED_L}" height="${bed.w}" fill="#f5f5f3" stroke="#000" stroke-width="0.02"/>`;

        if (editMode && bedImages[bed.i]) {
          svg += `<image href="${R2_URL}/${bedImages[bed.i]}" x="${x0}" y="${z0}" width="${BED_L}" height="${bed.w}" preserveAspectRatio="xMidYMid meet" opacity="0.45"/>`;
        }

        svg += `<text x="${x0 + 0.1}" y="${z0 + 0.28}" font-size="0.22" fill="#aaa" font-family="system-ui">${bed.i + 1}</text>`;
        svg += `<line x1="0" y1="${z0}" x2="0" y2="${z0 + bed.w}" stroke="#000" stroke-width="0.025" opacity="0.5"/>`;
        if (editMode) {
          const btnW = 0.6, btnH = 0.28, btnX = x0 + BED_L - btnW - 0.1, btnY = z0 + 0.08;
          svg += `<rect x="${btnX}" y="${btnY}" width="${btnW}" height="${btnH}" rx="0.06" fill="${bedImages[bed.i] ? '#555' : '#888'}" opacity="0.7" data-upload-bed="${bed.i}" style="cursor:pointer"/>`;
          svg += `<text x="${btnX + btnW/2}" y="${btnY + 0.19}" font-size="0.16" fill="#fff" font-family="system-ui" text-anchor="middle" pointer-events="none">${bedImages[bed.i] ? '🖼 Bild' : '+ Bild'}</text>`;
        }
      }

      // placements
      const ver = currentVersion();
      const placements = ver?.placements ?? [];
      const dotR = entry => (entry?.worldW ?? 0.4) / 2;

      for (const p of placements) {
        const entry = bySlug.get(p.slug);
        const matches = !filterText || [entry?.name, entry?.name_de, entry?.family]
          .some(s => s?.toLowerCase().includes(filterText));
        const color   = colors[p.slug] ?? '#ccc';
        const opacity = !filterText ? 0.85 : matches ? 0.85 : 0.15;
        const r       = dotR(entry);
        const isSelected = editMode && p.slug === selectedSlug;
        svg += `<circle cx="${p.x.toFixed(3)}" cy="${p.z.toFixed(3)}" r="${r.toFixed(3)}"
          fill="${color}" opacity="${opacity}"
          stroke="${isSelected ? '#000' : 'none'}" stroke-width="0.04"
          data-slug="${p.slug}" data-id="${p.id}"
          data-name="${entry?.name ?? p.slug}" data-de="${entry?.name_de ?? ''}"/>`;
      }

      svg += '</svg>';
      document.getElementById('bed-plan').innerHTML = svg;
    }

    let activeGarden = _activeGardenId;
    let filterText = '';

    // ── Custom plants ─────────────────────────────────────────────────────────

    function toSlug(name) {
      return name.toLowerCase()
        .replace(/ä/g, 'ae').replace(/ö/g, 'oe').replace(/ü/g, 'ue').replace(/ß/g, 'ss')
        .replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '');
    }

    async function loadCustomPlants() {
      try {
        const plants = await fetch(`/api/custom-plants?garden=${activeGarden}`).then(r => r.json());
        for (const p of plants) {
          const entry = {
            slug: p.slug, name: p.name, name_de: p.name_de, family: p.family,
            color: p.color, worldW: p.world_w, worldH: p.world_h,
            _custom: true,
          };
          bySlug.set(p.slug, entry);
          if (!stagesBySlug.has(p.slug)) stagesBySlug.set(p.slug, []);
          // also add to the garden's plant list
          const g = gardens.find(g => g.id === p.garden);
          if (g && !g.plants.includes(p.slug)) g.plants.push(p.slug);
        }
      } catch {}
    }

    const [_planData, , , _plantInfoRows] = await Promise.all([

    for (const [slug, ov] of Object.entries(store.nameOverrides ?? {})) {

    const addPlantBtn  = document.getElementById('add-plant-btn');
