<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Aquilegia — SVG test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fff; font-family: system-ui, sans-serif; overflow: hidden; height: 100vh; }

    #canvas-wrap { position: absolute; inset: 0; z-index: 0; }
    #canvas-wrap canvas { display: block; width: 100% !important; height: 100% !important; }

    #ui {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .month-btn {
      padding: 6px 16px;
      border: 1px solid #ccc;
      border-radius: 20px;
      background: #fff;
      font-size: 12px;
      cursor: pointer;
      color: #666;
      transition: all 0.15s;
    }

    .month-btn:hover { border-color: #888; color: #222; }
    .month-btn.active { background: #222; color: #fff; border-color: #222; }

    #hint {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: #bbb;
      pointer-events: none;
      z-index: 10;
    }

    #view-ui {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-end;
      z-index: 10;
    }

    .view-row { display: flex; gap: 6px; }

    .view-btn {
      padding: 5px 12px;
      border: 1px solid #ccc;
      border-radius: 20px;
      background: #fff;
      font-size: 11px;
      cursor: pointer;
      color: #666;
      transition: all 0.15s;
    }
    .view-btn:hover { border-color: #888; color: #222; }
    .view-btn.active { background: #222; color: #fff; border-color: #222; }

    #export-btn {
      padding: 5px 14px;
      border: 1px solid #222;
      border-radius: 20px;
      background: #fff;
      font-size: 11px;
      cursor: pointer;
      color: #222;
      transition: all 0.15s;
    }
    #export-btn:hover { background: #222; color: #fff; }
  </style>
</head>
<body>
  <div id="canvas-wrap"><canvas id="c"></canvas></div>

  <div id="hint">orbit to view in 3D</div>

  <div id="view-ui">
    <div class="view-row">
      <button class="view-btn active" data-view="3d">3D</button>
      <button class="view-btn" data-view="plan">Plan</button>
      <button class="view-btn" data-view="n-elev">N Elev</button>
      <button class="view-btn" data-view="e-elev">E Elev</button>
    </div>
    <button id="export-btn">Export SVG</button>
  </div>

  <div id="ui">
    <button class="month-btn" data-month="february">Feb</button>
    <button class="month-btn" data-month="march">Mar</button>
    <button class="month-btn" data-month="april">Apr</button>
    <button class="month-btn" data-month="may">May</button>
    <button class="month-btn active" data-month="june">Jun</button>
    <button class="month-btn" data-month="july">Jul</button>
    <button class="month-btn" data-month="august">Aug</button>
    <button class="month-btn" data-month="september">Sep</button>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
