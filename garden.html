<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,400;0,600;1,400;1,600&family=Source+Code+Pro:wght@300;400&display=block" rel="stylesheet">
  <link rel="stylesheet" href="/globals.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <button class="hamburger" id="topbar-btn" aria-label="Menü">
    <span></span><span></span><span></span>
  </button>
  <div class="topbar-dropdown" id="topbar-dropdown" hidden></div>

  <div class="garden-layout">

    <!-- Column 1: Garden + Beobachtungen (static, left) -->
    <div class="garden-col garden-col--garden">
      <div class="section-header no-border"><a class="" href="/">Blühende Gärten</a></div>
      <section>
        
        <div class="page-header chapeau">
          <h1 id="garden-name"></h1>
        </div>
        <div class="section-header">
          <h3>Alle Beobachtungen</h3>
          <button id="quick-obs-btn" class="action-btn-icon">+</button>
        </div>
        <div class="section-content no-horizontal-padding">
          <div id="obs-carousel"></div>
        </div>
      </section>
      <section id="herbar-section" hidden>
        <div class="section-header">
          <h3>Herbarbelege</h3>
        </div>
        <div class="section-content no-horizontal-padding">
          <div id="herbar-carousel"></div>
        </div>
      </section>
    </div>

    <!-- Sliding panels: Beete + Pflanzen -->
    <div class="garden-panels">

      <!-- Column 2: Beete -->
      <div class="garden-col garden-col--bed">
        <section>
          <div class="section-header no-border">
            <h3 id="bed-name" spellcheck="false">Beete</h3>
            <button id="bed-edit-btn" class="action-btn" hidden>Bearbeiten</button>
          </div>
          <div id="bed-version-bar" class="section-content" hidden>
            <select id="version-select" class="obs-select"></select>
          </div>
          <div id="bed-plan"></div>
          <div id="bed-actions" class="section-content" hidden>
            <button id="version-copy-btn" class="action-btn">Kopieren</button>
            <button id="bed-config-btn" class="action-btn-ghost">Einrichten</button>
          </div>
        </section>
      </div>
      <input type="file" id="bed-img-input" accept="image/*" hidden>

      <!-- Column 3: Pflanzen -->
      <div class="garden-col garden-col--plants">
        <section>
          <div class="section-header no-border">
            <h3><span id="plant-count"></span> Pflanzen</h3>
            <button id="add-plant-btn" class="action-btn-icon">+</button>
          </div>
          <div class="section-content">
            <input id="plant-filter" class="filter-input" type="text" placeholder="Filtern…" autocomplete="off" spellcheck="false">
            <label id="plant-filter-bed-label" class="plant-filter-bed-label" hidden>
              <input id="plant-filter-bed" type="checkbox"> im Beet
            </label>
          </div>
          <div id="plant-list"></div>
        </section>
      </div>

    </div>
  </div>

  <dialog id="plant-modal" tabindex="-1">
    <div class="plant-modal-inner">
      <div class="plant-modal-layout">

        <div class="plant-modal-info">
          <div class="plant-modal-header">
            <div class="botanical-name plant-modal-name" spellcheck="false"></div>
            <div class="german-name plant-modal-de" spellcheck="false"></div>
            <div class="plant-modal-meta">
              <input class="plant-modal-family" type="text" placeholder="Familie" spellcheck="false" autocomplete="off">
              <label class="plant-color-swatch" for="plant-color-input"></label>
              <input class="plant-color-picker" id="plant-color-input" type="color">
            </div>
          </div>
          <div class="plant-modal-gardens"></div>
          <details class="plant-modal-data" open>
            <summary>Pflanzendaten</summary>
            <div class="plant-modal-bloom-bar"></div>
            <div class="plant-modal-info-rows"></div>
            <details class="plant-modal-changelog" hidden>
              <summary>Änderungsprotokoll</summary>
              <div class="plant-modal-changelog-rows"></div>
            </details>
          </details>
        </div>

        <div class="plant-modal-observations">
          <div class="plant-modal-obs-header">
            <div class="section-header">
              <h3>Beobachtungen</h3>
              <button class="action-btn-icon" id="plant-modal-close">×</button>
            </div>
            <button class="action-btn-outline" id="plant-modal-obs-btn">+ Neue Beobachtung</button>
          </div>
          <div class="plant-modal-obs-list">
            <div class="obs-col"></div>
            <div class="obs-col"></div>
          </div>
        </div>

      </div>
    </div>
  </dialog>

  <dialog id="obs-form-dialog" tabindex="-1">
    <div class="obs-form-inner">
      <div class="section-header">
        <h2 class="obs-form-title" id="obs-form-title">Beobachtung</h2>
        <button class="action-btn-icon" id="obs-form-close">×</button>
      </div>
      <div class="obs-file-row">
        <label class="obs-file-label" id="obs-form-file-label">
          <span id="obs-form-file-text">Hochladen</span>
          <input id="obs-form-file" type="file" accept=".jpg,.jpeg,.png,.webp,.heic,.gif">
        </label>
        <label class="obs-file-label obs-camera-label" id="obs-form-camera-label">
          <span>Kamera</span>
          <input id="obs-form-camera" type="file" accept="image/*" capture="environment">
        </label>
      </div>
      <div id="obs-form-location" class="obs-form-location" hidden></div>
      <div class="obs-form-row">
        <div class="obs-form-field">
          <label class="obs-form-label">Datum</label>
          <input id="obs-form-date" class="obs-input" type="date">
        </div>
        <div class="obs-form-field">
          <label class="obs-form-label">Typ</label>
          <select id="obs-form-type" class="obs-select">
            <option value="foto">Foto</option>
            <option value="zeichnung">Zeichnung</option>
            <option value="herbarbeleg">Herbarbeleg</option>
            <option value="notiz">Notiz</option>
          </select>
        </div>
        <div class="obs-form-field">
          <label class="obs-form-label">Garten</label>
          <select id="obs-form-garden" class="obs-select"></select>
        </div>
      </div>
      <div id="obs-form-identified" hidden></div>
      <div id="obs-form-plant-grid" class="obs-plant-grid"></div>
      <textarea id="obs-form-text" class="obs-textarea" placeholder="Beobachtung, Beschreibung…"></textarea>
      <div id="obs-form-msg" class="obs-form-msg"></div>
      <div class="obs-form-actions">
        <button id="obs-form-submit" class="action-btn">Speichern</button>
        <button id="obs-form-cancel" class="action-btn-ghost">Abbrechen</button>
      </div>
    </div>
  </dialog>

  <dialog id="obs-modal" tabindex="-1">
    <button class="obs-nav obs-nav--prev">&#8249;</button>
    <div class="obs-modal-inner">
      <div class="obs-modal-img">
        <img src="" alt="">
        <div class="obs-modal-info">
          <div class="obs-modal-plants"></div>
          <div class="obs-modal-place observation-place"></div>
          <div class="obs-modal-date observation-date"></div>
          <div class="obs-modal-note"></div>
        </div>
      </div>
    </div>
    <button class="obs-nav obs-nav--next">&#8250;</button>
    <div class="obs-modal-list" hidden></div>
  </dialog>

  <dialog id="add-plant-dialog" tabindex="-1">
    <div class="obs-form-inner">
      <div class="section-header">
        <h2 class="obs-form-title">Pflanze hinzufügen</h2>
        <button class="action-btn-icon" id="add-plant-close">×</button>
      </div>
      <div class="obs-form-row">
        <div class="obs-form-field">
          <label class="obs-form-label">Botanischer Name</label>
          <input id="apf-name" class="obs-input" type="text" autocomplete="off" spellcheck="false" placeholder="z.B. Lavandula angustifolia">
        </div>
        <div class="obs-form-field">
          <label class="obs-form-label">Deutscher Name</label>
          <input id="apf-name-de" class="obs-input" type="text" autocomplete="off" spellcheck="false" placeholder="z.B. Echter Lavendel">
        </div>
      </div>
      <div class="obs-form-row">
        <div class="obs-form-field">
          <label class="obs-form-label">Familie</label>
          <input id="apf-family" class="obs-input" type="text" autocomplete="off" spellcheck="false" placeholder="z.B. Lamiaceae">
        </div>
        <div class="obs-form-field obs-form-field--shrink">
          <label class="obs-form-label">Farbe</label>
          <input id="apf-color" class="obs-input" type="color" value="#a0c878">
        </div>
      </div>
      <div id="apf-msg" class="obs-form-msg"></div>
      <div class="obs-form-actions">
        <button id="apf-submit" class="action-btn">Hinzufügen</button>
        <button id="apf-cancel" class="action-btn-ghost">Abbrechen</button>
      </div>
    </div>
  </dialog>

  <dialog id="lightbox" tabindex="-1">
    <img id="lightbox-img" src="" alt="">
  </dialog>

  <script type="module" src="/src/garden-app.js"></script>
  <script type="module" src="/src/topbar.js"></script>
</body>
</html>
